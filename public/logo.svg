<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 160" fill="none">
  <defs>
    <linearGradient id="mGradient" x1="20%" y1="15%" x2="85%" y2="95%">
      <stop offset="0%" stop-color="#1E9FFF"/>
      <stop offset="35%" stop-color="#0077D4"/>
      <stop offset="65%" stop-color="#0055AA"/>
      <stop offset="100%" stop-color="#003366"/>
    </linearGradient>
    <linearGradient id="mCenter" x1="30%" y1="25%" x2="70%" y2="85%">
      <stop offset="0%" stop-color="#004D80"/>
      <stop offset="100%" stop-color="#002B4D"/>
    </linearGradient>
    <linearGradient id="arrowGradient" x1="25%" y1="10%" x2="95%" y2="90%">
      <stop offset="0%" stop-color="#00C6FF"/>
      <stop offset="45%" stop-color="#00A3E0"/>
      <stop offset="100%" stop-color="#0077CC"/>
    </linearGradient>
  </defs>

  <!-- Left vertical bar -->
  <rect x="38" y="22" width="38" height="96" rx="6" fill="url(#mGradient)"/>
  
  <!-- Center connection (darker) -->
  <polygon points="72,22 108,118 128,22" fill="url(#mCenter)"/>
  
  <!-- Right lower vertical -->
  <rect x="128" y="68" width="28" height="50" rx="5" fill="#003366"/>
  
  <!-- Arrow body -->
  <polygon points="102,32 138,58 138,74 162,74 162,52 195,78 162,26 162,48 138,48" fill="url(#arrowGradient)"/>
  
  <!-- Arrow head -->
  <polygon points="178,42 212,72 178,58" fill="url(#arrowGradient)"/>
  
  <!-- Subtle highlight -->
  <line x1="115" y1="38" x2="160" y2="38" stroke="#FFFFFF" stroke-opacity="0.22" stroke-width="3.5" stroke-linecap="round"/>
</svg>